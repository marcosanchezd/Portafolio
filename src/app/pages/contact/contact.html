<section class="contact-page">
  <h2>Contactame</h2>
  <p class="contact-intro">¿Tienes alguna pregunta o propuesta? Escríbeme y te respondo a la brevedad.</p>

  <form #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)" class="contact-form">

    <div class="form-group">
      <label for="nombre">Nombre</label>
      <input
        id="nombre"
        name="nombre"
        type="text"
        [(ngModel)]="formData.nombre"
        required
        placeholder="Tu nombre completo"
      />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="formData.email"
        required
        placeholder="tucorreo@ejemplo.com"
      />
    </div>

    <div class="form-group">
      <label for="asunto">Asunto</label>
      <input
        id="asunto"
        name="asunto"
        type="text"
        [(ngModel)]="formData.asunto"
        required
        placeholder="Motivo del mensaje"
      />
    </div>

    <div class="form-group">
      <label for="mensaje">Mensaje</label>
      <textarea
        id="mensaje"
        name="mensaje"
        [(ngModel)]="formData.mensaje"
        required
        rows="5"
        placeholder="Escribe tu mensaje aquí..."
      ></textarea>
    </div>

    <button type="submit" [disabled]="contactForm.invalid || enviando">
      {{ enviando ? 'Enviando...' : 'Enviar mensaje' }}
    </button>

    @if (enviado) {
      <p class="form-feedback success">Mensaje enviado correctamente.</p>
    }
    @if (error) {
      <p class="form-feedback error">Ocurrió un error. Intenta de nuevo.</p>
    }

  </form>
</section>
